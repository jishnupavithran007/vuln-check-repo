# Stages 2 + 3 + 4 (independent): on every Renovate upgrade PR — verify the
# affected packages; if it fails, Claude heals; then guardrails check the fix
# didn't cheat. The AI fix is pushed back to the PR branch either way, but a
# guardrail failure labels the PR needs-human-review instead of passing clean.
#
# Needs a repo secret ANTHROPIC_API_KEY (valid Anthropic API key) for Stage 3.
name: verify-and-heal

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-heal:
    if: startsWith(github.head_ref, 'chore/upgrade-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: "8"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      # ---- Stage 2: verify ----
      - name: Verify (Stage 2)
        id: verify
        continue-on-error: true
        run: pnpm -r test

      - name: Verification passed
        if: steps.verify.outcome == 'success'
        run: echo "Stage 2 passed — no healing needed."

      # ---- Stage 3: heal (only if verify failed) ----
      - name: Heal with Claude (Stage 3)
        id: heal
        if: steps.verify.outcome == 'failure'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          npm install -g @anthropic-ai/claude-code
          DEP=$(echo "${{ github.head_ref }}" | sed -E 's#chore/upgrade-(.+)-to-.*#\1#')
          bash tools/upgrade-automation/heal-upgrade.sh \
            --workdir "$PWD" --verify-cmd "pnpm -r test" --dep "$DEP" --max-retries 3

      # ---- Stage 4: guardrails (only if heal succeeded) ----
      - name: Guardrails (Stage 4)
        id: guard
        if: steps.verify.outcome == 'failure' && steps.heal.outcome == 'success'
        continue-on-error: true
        run: node tools/upgrade-automation/check-guardrails.mjs --base "origin/${{ github.base_ref }}"

      # ---- push the AI fix back to the PR branch (healed) ----
      - name: Push the AI fix
        if: steps.verify.outcome == 'failure' && steps.heal.outcome == 'success'
        run: |
          if ! git diff --quiet; then
            git config user.name  "upgrade-bot"
            git config user.email "upgrade-bot@users.noreply.github.com"
            git commit -am "fix(deps): AI heal for ${{ github.head_ref }}"
            git push origin HEAD:${{ github.head_ref }}
          fi

      # ---- healed AND clean -> success ----
      - name: Healed and clean
        if: steps.verify.outcome == 'failure' && steps.heal.outcome == 'success' && steps.guard.outcome == 'success'
        run: echo "Healed and passed all guardrails."

      # ---- healed BUT guardrails flagged a shortcut -> human review ----
      - name: Healed but flagged
        if: steps.verify.outcome == 'failure' && steps.heal.outcome == 'success' && steps.guard.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: ['needs-human-review']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Claude healed this upgrade, but Stage 4 guardrails flagged the fix (e.g. an upgraded dependency is no longer used, or a suppression/config edit slipped in). See the guardrails step in the run log. Needs human review.'
            });
            core.setFailed('Guardrails failed — needs human review.');

      # ---- could not heal -> escalate ----
      - name: Escalate (max retries reached)
        if: steps.verify.outcome == 'failure' && steps.heal.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: ['needs-human-review']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Stage 3 could not heal this upgrade after 3 attempts. Needs human review — see the AI_CHANGES.md journal in the run logs.'
            });
            core.setFailed('Healing failed after max retries.');
