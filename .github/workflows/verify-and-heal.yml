# Stages 3 + 4 — chained AFTER the `ci` pipeline (Option A).
#
# This runs only when `ci` (build + lint + test) has FINISHED and FAILED, on a
# Renovate upgrade branch. It heals the code with Claude, runs guardrails, and
# pushes the fix back to the PR branch. The push uses a PAT (RENOVATE_TOKEN) so
# `ci` re-runs on the healed commit — if it now passes, this workflow fires
# again but skips (conclusion == success), so there is no loop.
#
# Secrets: CLAUDE_CODE_OAUTH_TOKEN (or ANTHROPIC_API_KEY) for healing;
#          RENOVATE_TOKEN (PAT) so the healed push re-triggers ci.
name: verify-and-heal

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    # Only when ci failed, it was a PR, and the branch is a Renovate upgrade.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          github.event.workflow_run.event == 'pull_request' &&
          startsWith(github.event.workflow_run.head_branch, 'chore/upgrade-') }}
    runs-on: ubuntu-latest
    env:
      BR: ${{ github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: "8"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          git fetch origin "main:refs/remotes/origin/main" || true
          pnpm install --no-frozen-lockfile

      # ---- Stage 3: heal (ci already failed, so we go straight to healing) ----
      - name: Heal with Claude (Stage 3)
        id: heal
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] && unset CLAUDE_CODE_OAUTH_TOKEN || true
          [ -z "${ANTHROPIC_API_KEY:-}" ] && unset ANTHROPIC_API_KEY || true
          npm install -g @anthropic-ai/claude-code
          DEP=$(echo "$BR" | sed -E 's#chore/upgrade-(.+)-to-.*#\1#')
          # Each retry re-runs the SAME checks ci ran (build/lint/test), so the
          # failure log fed to Claude matches what ci reported.
          bash tools/upgrade-automation/heal-upgrade.sh \
            --workdir "$PWD" \
            --verify-cmd "bash tools/upgrade-automation/verify-upgrade.sh --branch $BR --base origin/main" \
            --dep "$DEP" --max-retries 3

      # ---- Stage 4: guardrails (only if heal succeeded) ----
      - name: Guardrails (Stage 4)
        id: guard
        if: steps.heal.outcome == 'success'
        continue-on-error: true
        run: node tools/upgrade-automation/check-guardrails.mjs --base origin/main

      # ---- push the fix (PAT push so ci re-runs on the healed commit) ----
      - name: Push the AI fix
        if: steps.heal.outcome == 'success'
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if ! git diff --quiet; then
            git config user.name  "upgrade-bot"
            git config user.email "upgrade-bot@users.noreply.github.com"
            git commit -am "fix(deps): AI heal for ${BR}"
            if [ -n "${RENOVATE_TOKEN:-}" ]; then
              git push "https://x-access-token:${RENOVATE_TOKEN}@github.com/${{ github.repository }}" "HEAD:${BR}"
            else
              echo "No RENOVATE_TOKEN — pushing with GITHUB_TOKEN (ci will NOT re-run automatically)."
              git push origin "HEAD:${BR}"
            fi
          fi

      # ---- report on the PR when it needs a human ----
      - name: Flag or escalate on the PR
        if: always() && (steps.heal.outcome == 'failure' || steps.guard.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let number = (run.pull_requests && run.pull_requests[0] && run.pull_requests[0].number) || null;
            if (!number) {
              const { data } = await github.rest.pulls.list({
                owner: context.repo.owner, repo: context.repo.repo,
                state: 'open', head: `${context.repo.owner}:${run.head_branch}`,
              });
              number = data[0] && data[0].number;
            }
            if (!number) { core.setFailed('Could not find the PR for this branch.'); return; }

            const healFailed = '${{ steps.heal.outcome }}' === 'failure';
            const body = healFailed
              ? 'Stage 3 could not heal this upgrade after 3 attempts. Needs human review — see the AI_CHANGES.md journal in the run logs.'
              : 'Claude healed this upgrade, but Stage 4 guardrails flagged the fix (e.g. an upgraded dependency is no longer used, or a suppression/config edit slipped in). Needs human review.';

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: number, labels: ['needs-human-review'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: number, body,
            });
            core.setFailed(healFailed ? 'Healing failed after max retries.' : 'Guardrails failed — needs human review.');
